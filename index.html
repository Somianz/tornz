<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💗 เธอน่ารักที่สุด</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0e8f5;
    --bg2: #ede1f7;
    --pink: #f4a7c3;
    --lavender: #c9b8f0;
    --blue: #aed6f1;
    --peach: #fcd6b8;
    --white: #faf5ff;
    --text: #8b6aa0;
    --text-dark: #6b4f80;
    --shadow-light: #ffffff;
    --shadow-dark: #d4c0e8;
    --glow-pink: rgba(244, 167, 195, 0.6);
    --glow-lavender: rgba(201, 184, 240, 0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Prompt', 'Poppins', sans-serif;
    background: linear-gradient(135deg, #f5edfb 0%, #ede4f8 30%, #e8dff5 60%, #f0e8f8 100%);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ─── Animated Blobs ─── */
  .blobs {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.35;
    animation: blobFloat 10s ease-in-out infinite;
  }
  .blob-1 { width: 380px; height: 380px; background: radial-gradient(#f4a7c3, #f9cce0); top: -80px; left: -80px; animation-delay: 0s; }
  .blob-2 { width: 320px; height: 320px; background: radial-gradient(#c9b8f0, #ddd4f8); top: 30%; right: -60px; animation-delay: -3s; }
  .blob-3 { width: 260px; height: 260px; background: radial-gradient(#aed6f1, #cce8f8); bottom: 10%; left: 10%; animation-delay: -6s; }
  .blob-4 { width: 200px; height: 200px; background: radial-gradient(#fcd6b8, #fde8d4); bottom: 20%; right: 15%; animation-delay: -2s; }
  @keyframes blobFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(20px, -25px) scale(1.05); }
    66% { transform: translate(-15px, 15px) scale(0.97); }
  }

  /* ─── Floating Hearts ─── */
  .hearts-container {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
  }
  .heart {
    position: absolute;
    font-size: 1.2rem;
    opacity: 0;
    animation: floatHeart linear infinite;
  }
  @keyframes floatHeart {
    0%   { opacity: 0; transform: translateY(0) scale(0.5) rotate(-10deg); }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-110vh) scale(1.2) rotate(15deg); }
  }

  /* ─── Layout ─── */
  .page {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 40px; padding: 40px 20px;
  }

  /* ─── Top Glass Card ─── */
  .top-card {
    background: rgba(255,255,255,0.45);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1.5px solid rgba(255,255,255,0.7);
    border-radius: 28px;
    padding: 18px 36px;
    box-shadow:
      8px 8px 20px rgba(212,192,232,0.45),
      -6px -6px 18px rgba(255,255,255,0.9);
    display: flex; align-items: center; gap: 12px;
    animation: fadeDown 1s ease forwards;
  }
  .top-card .emoji { font-size: 1.8rem; animation: spin 4s linear infinite; }
  .top-card span { font-size: 1rem; font-weight: 300; color: var(--text); letter-spacing: 0.04em; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-30px); } to { opacity:1; transform:translateY(0); } }

  /* ─── Floating Center Text ─── */
  .marquee-outer {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 20px;
    animation: fadeIn 1.2s ease 0.3s both;
  }

  .marquee-text {
    font-size: clamp(1.8rem, 5.5vw, 3.8rem);
    font-weight: 900;
    text-align: center;
    animation: floatText 3s ease-in-out infinite;
    letter-spacing: 0.03em;
    line-height: 1.5;
  }
  .marquee-text .word {
    background: linear-gradient(90deg, #c0357a, #8b3fbf, #3a7fd5, #8b3fbf, #c0357a);
    background-size: 300% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 5s ease infinite;
    filter: drop-shadow(0 2px 10px rgba(140, 60, 190, 0.35));
  }
  .marquee-text .emoji-char {
    -webkit-text-fill-color: initial;
    background: none;
    background-clip: initial;
    -webkit-background-clip: initial;
    filter: none;
    font-size: 0.9em;
  }
  @keyframes gradientShift {
    0%,100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  @keyframes floatText {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-14px); }
  }



  /* ─── Music Button ─── */
  .music-btn {
    position: fixed; bottom: 30px; right: 30px; z-index: 100;
    width: 58px; height: 58px; border-radius: 50%;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(16px);
    border: 1.5px solid rgba(255,255,255,0.8);
    box-shadow:
      6px 6px 18px rgba(195,165,225,0.45),
      -4px -4px 14px rgba(255,255,255,0.95);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    cursor: pointer;
    transition: all 0.3s ease;
    animation: pulse 2s ease-in-out infinite;
  }
  .music-btn:hover { transform: scale(1.1); }
  .music-btn.playing { animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 6px 6px 18px rgba(195,165,225,0.45), -4px -4px 14px rgba(255,255,255,0.95); }
    50%      { box-shadow: 6px 6px 28px rgba(224,122,181,0.6), -4px -4px 14px rgba(255,255,255,0.95), 0 0 30px rgba(224,122,181,0.3); }
  }

  /* ─── Sparkles ─── */
  .sparkle {
    position: fixed; pointer-events: none; z-index: 2;
    font-size: 1rem; opacity: 0;
    animation: sparkleAnim ease-in-out infinite;
  }
  @keyframes sparkleAnim {
    0%,100% { opacity:0; transform: scale(0.3) rotate(0deg); }
    50%      { opacity:0.8; transform: scale(1.2) rotate(180deg); }
  }

  /* ─── Bottom decoration ─── */
  .bottom-row {
    display: flex; gap: 20px; align-items: center;
    animation: fadeIn 1.6s ease 0.9s both;
  }
  .neu-pill {
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(12px);
    border: 1.5px solid rgba(255,255,255,0.75);
    border-radius: 50px;
    padding: 10px 22px;
    font-size: 0.8rem;
    color: var(--text);
    box-shadow:
      5px 5px 14px rgba(195,165,225,0.35),
      -4px -4px 12px rgba(255,255,255,0.9);
    letter-spacing: 0.04em;
    animation: pillFloat 4s ease-in-out infinite;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    white-space: nowrap;
  }
  .neu-pill:nth-child(2) { animation-delay: -1.5s; }
  .neu-pill:nth-child(3) { animation-delay: -3s; }
  @keyframes pillFloat {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }

  @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  /* ─── Responsive ─── */
  @media (max-width: 600px) {
    .top-card { padding: 14px 22px; }
    .top-card span { font-size: 0.85rem; }
    .marquee-outer { border-radius: 24px; padding: 24px 0; }
    .btn-group { gap: 10px; }
    .msg-btn { font-size: 0.78rem; padding: 10px 18px; }
    .music-btn { width: 50px; height: 50px; bottom: 20px; right: 20px; font-size: 1.3rem; }
  }
</style>
</head>
<body>

<!-- Blobs -->
<div class="blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
</div>

<!-- Floating Hearts -->
<div class="hearts-container" id="hearts"></div>

<!-- Page -->
<div class="page">

  <div class="top-card">
    <span class="emoji">🌸</span>
    <span>ข้อความพิเศษจากหัวใจ</span>
  </div>

  <div class="marquee-outer">
    <div class="marquee-text" id="msg1"></div>
  </div>



  <div class="bottom-row">
    <div class="neu-pill">✨ forever</div>
    <div class="neu-pill">💗 always</div>
    <div class="neu-pill">🌷 you &amp; me</div>
  </div>

</div>

<!-- Music Toggle -->
<button class="music-btn" id="musicBtn" title="เปิด/ปิดเสียงดนตรี" onclick="toggleMusic()">🎵</button>

<!-- Hidden audio -->
<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3" type="audio/mp3">
</audio>

<script>
  /* ─── Messages ─── */
  const messages = [
    "เธอน่ารักที่สุดในจักรวาลนี้ 🌸",
    "You are the cutest person in the universe 💫🪐✨",
    "Having you is enough, I don't need anything else 💞",
    "You are my favorite dream that came true 🌙🌷"
  ];
  let currentMsg = 0;

  const emojiRegex = /(\p{Emoji_Presentation}|\p{Extended_Pictographic})/gu;

  function setMessage(text) {
    const el = document.getElementById('msg1');
    // Split into text segments and emoji segments
    const parts = [];
    let last = 0;
    let match;
    emojiRegex.lastIndex = 0;
    while ((match = emojiRegex.exec(text)) !== null) {
      if (match.index > last) {
        parts.push({ type: 'text', val: text.slice(last, match.index) });
      }
      parts.push({ type: 'emoji', val: match[0] });
      last = match.index + match[0].length;
    }
    if (last < text.length) parts.push({ type: 'text', val: text.slice(last) });

    el.innerHTML = parts.map(p =>
      p.type === 'emoji'
        ? `<span class="emoji-char">${p.val}</span>`
        : `<span class="word">${p.val}</span>`
    ).join('');
  }

setMessage(messages[0]);
  setInterval(() => {
    currentMsg = (currentMsg + 1) % messages.length;
    setMessage(messages[currentMsg]);
    spawnBurst();
  }, 6000);

  /* ─── Floating Hearts ─── */
  const heartEmojis = ['💗','💕','💖','🌸','✨','💫','🌷','💝','🩷','🫧'];
  const container = document.getElementById('hearts');

  function spawnHeart() {
    const h = document.createElement('div');
    h.classList.add('heart');
    h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    const size = 0.8 + Math.random() * 1.4;
    const left = Math.random() * 100;
    const dur  = 7 + Math.random() * 8;
    const delay = Math.random() * 5;
    h.style.cssText = `
      left: ${left}vw;
      bottom: -60px;
      font-size: ${size}rem;
      animation-duration: ${dur}s;
      animation-delay: ${delay}s;
    `;
    container.appendChild(h);
    setTimeout(() => h.remove(), (dur + delay + 1) * 1000);
  }

  setInterval(spawnHeart, 600);
  for (let i = 0; i < 8; i++) setTimeout(spawnHeart, i * 200);

  /* ─── Sparkle Burst ─── */
  const sparkleEmojis = ['✨','💫','🌟','⭐','💥'];
  function spawnBurst() {
    for (let i = 0; i < 12; i++) {
      const s = document.createElement('div');
      s.classList.add('sparkle');
      s.textContent = sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];
      const x = 10 + Math.random() * 80;
      const y = 10 + Math.random() * 80;
      const dur = 0.8 + Math.random() * 1.2;
      const delay = Math.random() * 0.5;
      s.style.cssText = `
        left: ${x}vw; top: ${y}vh;
        animation-duration: ${dur}s;
        animation-delay: ${delay}s;
        font-size: ${0.6 + Math.random() * 1}rem;
      `;
      document.body.appendChild(s);
      setTimeout(() => s.remove(), (dur + delay + 0.5) * 1000);
    }
  }

  /* ─── Static Sparkles ─── */
  function spawnStaticSparkles() {
    for (let i = 0; i < 14; i++) {
      const s = document.createElement('div');
      s.classList.add('sparkle');
      s.textContent = sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];
      const dur = 2 + Math.random() * 3;
      const delay = Math.random() * dur;
      s.style.cssText = `
        left: ${Math.random() * 100}vw;
        top:  ${Math.random() * 100}vh;
        font-size: ${0.5 + Math.random() * 0.8}rem;
        animation-duration: ${dur}s;
        animation-delay: -${delay}s;
      `;
      document.body.appendChild(s);
    }
  }
  spawnStaticSparkles();

  /* ─── Music ─── */
  const music = document.getElementById('bgMusic');
  const musicBtn = document.getElementById('musicBtn');
  let playing = false;

  function toggleMusic() {
    if (playing) {
      music.pause();
      musicBtn.textContent = '🎵';
      musicBtn.classList.remove('playing');
    } else {
      music.play().catch(() => {});
      musicBtn.textContent = '🎶';
      musicBtn.classList.add('playing');
    }
    playing = !playing;
  }
</script>
</body>
</html>
